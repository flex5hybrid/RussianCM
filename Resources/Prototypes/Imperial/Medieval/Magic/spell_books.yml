- type: entity
  parent: BaseItem
  id: MedievalSpellBookBase
  name: Вобля
  description: Гримуар может быть только один у мага. Он привязан к своему владельцу и нужен для изучения заклинаний.
  suffix: Empty
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Misc/magic_book.rsi
    state: icon
  - type: Item
    sprite: Imperial/Medieval/Misc/magic_book.rsi
  - type: UserInterface
    interfaces:
      enum.ImperialStoreUiKey.Key:
        type: ImperialStoreBoundUserInterface
  - type: ActivatableUI
    key: enum.ImperialStoreUiKey.Key
  - type: BindStoreOnEquip
  - type: ImperialStore
    name: medieval-store-name
    withdrawText: medieval-store-withdraw-button-text
    currencyTitle: medieval-store-currency-title-text
    cannotAccessStoreText: medieval-store-cannot-access-text
    ownerOnly: true
    categories:
    - MedievalFireSpells
    - MedievalLightSpells
    - MedievalVodkaSpells
    - MedievalDarknessSpells
    currencyWhitelist:
    - MagicMedievalFire
    - MagicMedievalLight
    - MagicMedievalVodka
    - MagicMedievalDarkness
    - ArchmagePoints
    insertedCurrencyWhitelist:
    - MagicMedievalDarkness
    balance:
      MagicMedievalFire: 1000
      MagicMedievalLight: 1000
      MagicMedievalVodka: 1000
      MagicMedievalDarkness: 1000
      ArchmagePoints: 100

