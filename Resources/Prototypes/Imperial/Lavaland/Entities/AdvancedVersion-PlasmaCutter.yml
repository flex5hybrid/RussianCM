- type: entity
  id: Advanced-WeaponPlasmaCutterBase
  abstract: true
  parent: [BaseItem, BaseWeaponBatterySmall]
  components:
  - type: Sprite
    sprite: Imperial/Lavaland/PlasmaCutter/advanced-base.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Item
    sprite: Imperial/Lavaland/PlasmaCutter/advanced-base.rsi
    size: Small
    shape:
    - 0,1, 1,0
    - 2,0, 0,1
  - type: Clothing
    sprite: Imperial/Lavaland/PlasmaCutter/advanced-base.rsi
    quickEquip: false
    slots:
    - suitStorage
    - Belt
  - type: Appearance
  - type: AmmoCounter
  - type: Gun
    projectileSpeed: 30
    fireRate: 0.2
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Imperial/Lavaland/PlasmaCutter/gun_shoot2.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: BatteryWeaponFireModes
    modeSwitchDelay: 3.5
    fireModes:
    - proto: Advanced-BulletPlasmaCutter
      fireCost: 100
    - proto: Advanced-AttackerBulletPlasmaCutter
      fireCost: 150
  - type: ProjectileBatteryAmmoProvider
    proto: Advanced-BulletPlasmaCutter
    fireCost: 100
  - type: UseDelay
  - type: Battery
    maxCharge: 3000
    startingCharge: 3000
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: MaterialEnergy
    materialWhiteList: [Plasma]
  - type: Tag
    tags:
    - OnlyMaterialEnergy
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 2

- type: entity
  name: Advanced plasma cutter
  id: Advanced-WeaponPlasmaCutter
  parent: [Advanced-WeaponPlasmaCutterBase, BaseCargoContraband]
  suffix: Full, Lavaland, Advanced
  description: ...
  components:
  - type: Battery
    maxCharge: 3000
    startingCharge: 3000


- type: entity
  name: Advanced plasma cutter
  id: Advanced-EmptyWeaponPlasmaCutter
  parent: Advanced-WeaponPlasmaCutter
  suffix: Empty, Lavaland, Advanced
  description: ...
  components:
  - type: Battery
    maxCharge: 3000
    startingCharge: 0




- type: entity
  id: Advanced-BulletPlasmaCutter
  name: cutter bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  description: ...
  components:
  - type: Reflective
    reflective:
      - NonEnergy
  - type: Sprite
    noRot: false
    sprite: Imperial/Lavaland/PlasmaCutter/bullet.rsi
    state: bullet
    shader: unshaded
    color: "#e49e7d"
  - type: GatheringProjectile
    amount: 30
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Blunt: 1
        Piercing: 1
        Heat: 5
        Structural: 35
  - type: StaminaDamageOnCollide
    damage: 20
  - type: TimedDespawn
    lifetime: 0.225
  - type: PointLight
    color: "#ffb938ab"
    energy: 4
    radius: 1.75
    softness: 1
    enabled: true
  - type: IgniteOnCollide
    fireStacks: 0.65
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.075,-0.075,0.075,0.075"
        hard: false
        mask:
        - Opaque
  - type: Ammo
    muzzleFlash: null



- type: entity
  id: Advanced-AttackerBulletPlasmaCutter
  name: attacker cutter bolt
  parent: Advanced-BulletPlasmaCutter
  categories: [ HideSpawnMenu ]
  description: ...
  components:
  - type: GatheringProjectile
    amount: 1
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Blunt: 3
        Piercing: 7
        Heat: 25
  - type: StaminaDamageOnCollide
    damage: 10
  - type: TimedDespawn
    lifetime: 0.30
  - type: PointLight
    color: "#d31e45b8"
    energy: 4
    radius: 1.7
    softness: 1
    enabled: true
  - type: Sprite
    noRot: false
    sprite: Imperial/Lavaland/PlasmaCutter/bullet.rsi
    state: bullet
    shader: unshaded
    color: "#9c3167"
  - type: IgniteOnCollide
    fireStacks: 0.35



