- type: entity
  id: WeaponPlasmaCutterBase
  abstract: true
  parent: [BaseItem, BaseWeaponBatterySmall]
  components:
  - type: Sprite
    sprite: Imperial/Lavaland/PlasmaCutter/base.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Item
    sprite: Imperial/Lavaland/PlasmaCutter/base.rsi
    size: Small
    shape:
    - 0,1, 1,0
    - 2,0, 0,1
  - type: Clothing
    sprite: Imperial/Lavaland/PlasmaCutter/base.rsi
    quickEquip: false
    slots:
    - suitStorage
    - Belt
  - type: Appearance
  - type: AmmoCounter
  - type: Gun
    projectileSpeed: 22.5
    fireRate: 0.35
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Imperial/Lavaland/PlasmaCutter/gun_shoot1.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: BatteryWeaponFireModes
    modeSwitchDelay: 3.5
    fireModes:
    - proto: BulletPlasmaCutter
      fireCost: 50
    - proto: AttackerBulletPlasmaCutter
      fireCost: 100
  - type: ProjectileBatteryAmmoProvider
    proto: BulletPlasmaCutter
    fireCost: 50
  - type: UseDelay
  - type: Battery
    maxCharge: 1500
    startingCharge: 1500
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: MaterialEnergy
    materialWhiteList: [Plasma]
  - type: Tag
    tags:
    - OnlyMaterialEnergy

- type: entity
  name: Plasma cutter
  id: WeaponPlasmaCutter
  parent: [WeaponPlasmaCutterBase, BaseCargoContraband]
  suffix: Full, Lavaland
  description: ...
  components:
  - type: Battery
    maxCharge: 1500
    startingCharge: 1500


- type: entity
  name: Plasma cutter
  id: EmptyWeaponPlasmaCutter
  parent: WeaponPlasmaCutter
  suffix: Empty, Lavaland
  description: ...
  components:
  - type: Battery
    maxCharge: 1500
    startingCharge: 0




- type: entity
  id: BulletPlasmaCutter
  name: cutter bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  description: ...
  components:
  - type: Reflective
    reflective:
      - NonEnergy
  - type: Sprite
    noRot: false
    sprite: Imperial/Lavaland/PlasmaCutter/bullet.rsi
    state: bullet
    shader: unshaded
    color: "#ffda94"
  - type: GatheringProjectile
    amount: 12
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Blunt: 1
        Piercing: 1
        Heat: 5
        Structural: 20
  - type: StaminaDamageOnCollide
    damage: 15
  - type: TimedDespawn
    lifetime: 0.225
  - type: PointLight
    color: "#ffaf3892"
    energy: 3
    radius: 1.75
    softness: 1
    enabled: true
  - type: IgniteOnCollide
    fireStacks: 0.4
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.05,-0.05,0.05,0.05"
        hard: false
        mask:
        - Opaque
  - type: Ammo
    muzzleFlash: null



- type: entity
  id: AttackerBulletPlasmaCutter
  name: attacker cutter bolt
  parent: BulletPlasmaCutter
  categories: [ HideSpawnMenu ]
  description: ...
  components:
  - type: GatheringProjectile
    amount: 1
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Blunt: 3
        Piercing: 5
        Heat: 13
  - type: StaminaDamageOnCollide
    damage: 5
  - type: TimedDespawn
    lifetime: 0.265
  - type: PointLight
    color: "#88225eb8"
    energy: 3
    radius: 1.7
    softness: 1
    enabled: true
  - type: Sprite
    noRot: false
    sprite: Imperial/Lavaland/PlasmaCutter/bullet.rsi
    state: bullet
    shader: unshaded
    color: "#9943bb"
  - type: IgniteOnCollide
    fireStacks: 0.2



