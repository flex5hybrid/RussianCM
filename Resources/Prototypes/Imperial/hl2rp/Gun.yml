- type: entity
  name: SMG
  parent: BaseWeaponSubMachineGun
  id: HL2WeaponSMG
  suffix: hl2
  description: Not the most reliable German. It happens?
  components:
  - type: Sprite
    sprite: Imperial/hl2rp/Gun/SMG.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: Imperial/hl2rp/Gun/SMG.rsi
    quickEquip: false
    slots:
    - Back
  - type: Gun
    fireRate: 5
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/atreides.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineSMGHL2
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineSMGHL2
      gun_chamber:
        name: Chamber
        startingItem: CartridgeSubmachineHL2
        priority: 1
        whitelist:
          tags:
          - CartridgeHL2SMG
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      awnings: !type:Container
  - type: Item
    size: Normal
    shape:
    - 0,0,2,1
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

- type: entity
  name: 9mm pistol
  parent: BaseWeaponPistol
  id: WeaponPistolHL2
  suffix: hl2
  description: Medium-sized pistol with 12 rounds of ammunition. It is dark gray on the top and khaki gray on the bottom. Uses 9x19 auto ammo.
  components:
  - type: Sprite
    sprite: Imperial/hl2rp/Gun/Pistol.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    fireRate: 5
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/silenced.ogg
      params:
        volume: -14
  - type: Item
    size: Normal
    shape: null
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolHL2
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolHL2
      gun_chamber:
        name: Chamber
        startingItem: CartridgeSubmachineHL2
        priority: 1
        whitelist:
          tags:
            - CartridgeHL2SMG
