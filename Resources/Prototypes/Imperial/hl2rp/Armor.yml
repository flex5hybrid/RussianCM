- type: entity
  parent: [ClothingOuterBaseMedium, AllowSuitStorageClothing, BaseRestrictedContraband]
  id: ClothingOuterArmorCPHL2
  suffix: hl2
  name: CP armor
  description: CP armor
  components:
  - type: Sprite
    sprite: Imperial/hl2rp/Armor/CParmor.rsi
  - type: Clothing
    sprite: Imperial/hl2rp/Armor/CParmor.rsi
  - type: Armor #Based on /tg/ but slightly compensated to fit the fact that armor stacks in SS14.
    modifiers:
      coefficients:
        Blunt: 0.60
        Slash: 0.70
        Piercing: 0.60 #Can save you, but bullets will still hurt. Will take about 10 shots from a Viper before critting, as opposed to 7 while unarmored and 16~ with a bulletproof vest.
        Heat: 0.80
        Stamina: 0.90 # Stamina resistance
  - type: ExplosionResistance
    damageCoefficient: 0.90

