- type: entity
  id: BaseMagazineSMGHL2
  parent: BaseItem
  name: SMG magazine (9mm)
  suffix: hl2
  abstract: true
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeHL2SMG
    capacity: 45
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Tag
    tags:
      - MagazineSMGHL2

- type: entity
  id: MagazineSMGHL2
  parent: BaseMagazineSMGHL2
  name: SMG magazine (9mm)
  suffix: hl2
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeSubmachineHL2
  - type: Sprite
    sprite: Imperial/hl2rp/Gun/SMG_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false

- type: entity
  id: MagazineSMGHL2Empty
  name: SMG magazine (SMG)
  suffix: hl2, empty
  parent: MagazineSMGHL2
  components:
  - type: BallisticAmmoProvider
    proto: null
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]


