- type: entity
  parent: ClothingShoesClownBase
  id: ClothingShoesClownSuper
  name: bling clown shoes
  description: Gotta Go Fast!
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Specific/clown.rsi
  - type: Clothing
    sprite: Clothing/Shoes/Specific/clown.rsi
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepClown
      params:
        variation: 0.17
  - type: PointLight
    radius: 7
    energy: 5
  - type: RgbLightController
    layers: [ 0 ]
  - type: NoSlip
  - type: ClothingSpeedModifier
    walkModifier: 2
    sprintModifier: 2
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 4.0
        Slash: 4.0
        Piercing: 4.0
        Heat: 4.0
        Radiation: 4.0
        Caustic: 4.0
        Stamina: 1.5

- type: entity
  name: pie gun
  parent: BaseItem
  id: WeaponCluwnePieAntique
  description: Clown's best friend!
  components:
  - type: Sprite
    sprite: Imperial/Cluwne/antique_piegun.rsi
    state: icon
  - type: Item
    sprite: Imperial/Cluwne/antique_piegun.rsi
    size: Large
    shape:
    - 0,0,3,1
  - type: Clothing
    sprite: Imperial/Cluwne/antique_piegun.rsi
    quickEquip: false
    slots:
    - suitStorage
  - type: Gun
    fireRate: 2
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
  - type: ProjectileBatteryAmmoProvider
    proto: FoodPieBananaCream
    fireCost: 100
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 40
  - type: Appearance
  - type: AmmoCounter

- type: entity
  parent: BikeHorn
  id: SuperBikeHorn
  name: super bike horn
  description: A horn off of a bicycle.
  components:
  - type: StaminaDamageOnHit
    damage: 120

- type: entity
  name: super wand of cluwning
  parent: WeaponWandPolymorphBase
  id: WeaponSuperWandCluwne
  description: Make their situation worse by turning them into a cluwne.
  components:
  - type: BasicEntityAmmoProvider
    proto: ProjectilePolyboltCluwne
    capacity: 1
    count: 1
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 30
  
- type: entity
  parent: BoxCardboard
  id: CluwneCybershizoBox
  name: cyber chyzo box
  description: EHEHEHHEHEHE!
  components:
  - type: StorageFill
    contents:
    - id: BikeHornImplanter
    - id: FreedomImplanter
    - id: EmpImplanter
    - id: ScramImplanter
    - id: MicroBombImplanter
  - type: Sprite
    layers:
    - state: box_hug
    - state: heart
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,3,2

- type: entity
  name: clown spider
  parent: MobClownSpider
  id: MobCluwneAtagSpider
  description: Combines the two most terrifying things in existence, spiders and clowns.
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      15: Dead

- type: entity
  parent: GrenadeBase
  id: ClusterCluwneGrenade
  name: clusterbang
  description: Launches three flashbangs after the timer runs out.
  suffix: Full
  components:
  - type: Sprite
    sprite: Objects/Weapons/Grenades/clusterbang.rsi
    layers:
    - state: icon
      map: ["enum.TriggerVisualLayers.Base"]
  - type: ScatteringGrenade
    fillPrototype: MobCluwneAtagSpider
    distance: 3
    velocity: 7
    capacity: 5
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/countdown.ogg
  - type: GenericVisualizer
    visuals:
      enum.Trigger.TriggerVisuals.VisualState:
        enum.ConstructionVisuals.Layer:
          Primed: { state: primed }
          Unprimed: { state: icon }
  - type: EmitSoundOnTrigger
    sound:
      path: "/Audio/Machines/door_lock_off.ogg"
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container

- type: entity
  parent: BoxCardboard
  id: CluwneGrenadeBox
  name: grenade box
  description: EHEHEHHEHEHE!
  components:
  - type: StorageFill
    contents:
    - id: ClusterCluwneGrenade
      amount: 5
  - type: Sprite
    layers:
    - state: box_hug
    - state: heart
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,3,2

- type: entity
  parent: ClothingHandsBase
  id: ClothingHandsShoegloves
  name: combat shoegloves
  description: Who puts boots at hands?
  components:
  - type: Sprite
    sprite: Imperial/Cluwne/combat_shoegloves.rsi
  - type: Clothing
    sprite: Imperial/Cluwne/combat_shoegloves.rsi
  - type: StaminaDamageOnHit
    damage: 20
  - type: MeleeWeapon
    attackRate: 0.4
    damage:
      types:
        Blunt: 30
    soundHit:
      collection: BoxingHit
    animation: WeaponArcFist
    mustBeEquippedToUse: true
  - type: Fiber
    fiberMaterial: fibers-leather
    fiberColor: fibers-red
  - type: FingerprintMask
  - type: MeleeThrowOnHit
    distance: 35
    speed: 25

- type: entity
  name: sus banana
  parent: BaseMob
  id: CluwneBananaEnt
  description: Sheesh lad
  suffix: Cluwne
  components:
  - type: Slippery
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/banana.rsi
    state: peel
  - type: InputMover
  - type: MovementSpeedModifier
    baseSprintSpeed: 8
    baseWalkSpeed: 6
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 120
        mask:
        - SmallMobMask
        layer:
        - SmallMobLayer

- type: entity
  id: BananaTech
  name: banana tech svitok
  parent: BaseSpellbook
  components:
  - type: Flammable
    fireSpread: true
    alwaysCombustible: true
    damage:
      types:
        Heat: 1
  - type: Damageable
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
            Ash:
              min: 1
              max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Item
    size: Normal
  - type: Sprite
    sprite: Objects/Magic/magicactions.rsi
    layers:
    - state: spell_default
  - type: Spellbook
    learnPermanently: true
    spellActions:
      CluwneBananaAction: -1

- type: entity
  id: CluwneBananaAction
  name: Bananana!
  description: GO BANANAS!
  components:
  - type: InstantAction
    useDelay: 50
    event: !type:PolymorphActionEvent
      protoId: CluwneBanana
    itemIconStyle: NoItem
    icon:
      sprite: Objects/Specific/Hydroponics/banana.rsi
      state: peel

- type: polymorph
  id: CluwneBanana
  configuration:
    entity: CluwneBananaEnt
    transferName: true
    inventory: None
    forced: true
    revertOnDeath: true
    revertOnCrit: true
    allowRepeatedMorphs: false
    duration: 5

