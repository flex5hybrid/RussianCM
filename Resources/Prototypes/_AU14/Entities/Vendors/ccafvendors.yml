  id: AU14CCAFclothingequipmentvendor
  name: CCAF apparel vendor
  description: >-
    An automated dispenser rack, hooked up to a small storage of Canadian Colonial Armed Forces apparel.
    Standard issue aboard naval vessels, military outposts, corporate-science installations and civilian colonies across the frontier.
    Manufactured to outfit personnel rapidly following cryogenic hypersleep or emergency mobilization.

    For full operational readiness, select one item from each section: fatigues with a webbing, footwear, gloves, headgear, armor, backpack, belt and a pouch.
