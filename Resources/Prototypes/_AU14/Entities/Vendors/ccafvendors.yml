- type: entity
  parent: ColMarTechBase
  id: AU14CCAFMGequipmentvendor
  name: CCAF automatic rifleman equipment vendor
  description: >-
    An automated weapons rack, hooked up to a small armory of Canadian Colonial Armed Forces light-machine gun systems.
    Standard issue for designated automatic riflemen on naval vessels and high-threat outposts.
    Built to bring fire support online rapidly after cryogenic hypersleep or emergency mobilization.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/smart_gun_operator_gear.rsi
  - type: CMAutomatedVendor
    sections:
    - name: Essential Equipment
      takeAll: CMUAREssentialEquipment
      entries:
      - id: RMCWeaponLMGM60
      - id: CMBeltMarine
      - id: AU14IMPBackpackMarine
    - name: Munitions
      entries:
      - id: RMCMagazineLMGM60
        amount: 40

- type: entity
  parent: ColMarTechBase
  id: AU14CCAFWeaponsVendor
  name: CCAF weapons rack
  description: >-
    An automated weapons rack, hooked up to a small armory of Canadian Colonial Armed Forces weaponry.
    Standard issue across the frontier where threats can appear without warning.
    Engineered to arm personnel in seconds following cryogenic hypersleep or emergency mobilization.

    For immediate combat readiness: select a primary weapon kit and a sidearm.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/guns.rsi
  - type: CMAutomatedVendor
    sections:
    - name: Weapons
      choices: { CMUPrimaryWeapon: 1 }
      entries:
      - id: AU14KitWeaponM75A
    - name: Primary Ammunition
      entries:
      - id: AU14MagazineRifleM75AMAS
        amount: 60
    - name: Handguns
      choices: { CMUHandgunsWeapon: 1 }
      entries:
      - id: AU14KitWeaponTPR23B
    - name: Handgun Ammunition
      entries:
      - id: CMMagazinePistolM1984
        amount: 60
    - name: Attachments
      choices: { CMUAttachmentsVendor: 1 }
      entries:
      - id: RMCAttachmentRailFlashlight
      - id: RMCAttachmentTwoPointSling

- type: entity
  parent: ColMarTechBase
  id: AU14CCAFSpecialWeaponsVendor
  name: CCAF special weapons rack
  description: >-
    An automated special weapons rack, hooked up to a restricted armory of Canadian Colonial Armed Forces heavy and breaching ordnance.
    Standard issue only for qualified operators.
    Engineered to deliver overwhelming firepower the instant cryogenic hypersleep ends or an emergency mobilization is called.

    Special weapons protocol: one weapon system of choice with a full ammunition loadout and explosives.
