- type: entity
  parent: ColMarTechBase
  id: AU14LACNcommandoWeaponsVendor
  name: LACN Naval Commandos weapons rack
  description: >-
    An automated weapons rack, hooked up to a small armory of Latin American Colonial Navy weaponry for the Naval Commandos.
    Standard issue across the frontier where threats can appear without warning.
    Engineered to arm personnel in seconds following cryogenic hypersleep or emergency mobilization.

    For immediate combat readiness: select a primary weapon kit and a sidearm.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessMarinePrep" ]
  - type: Sprite
