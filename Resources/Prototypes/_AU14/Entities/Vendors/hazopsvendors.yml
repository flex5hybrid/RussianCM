- type: entity
  parent: ColMarTechBase
  id: AU14HAZOPSMGequipmentvendor
  name: HAZOPS smartgunner equipment vendor
  description: >-
    An automated smartgunner rack, hooked up to a small armory of Hazardous Operations heavy-weapon operator systems of the Marine Special Operations Command.
    Standard issue for designated smart-gun crews on naval vessels and high-threat outposts.
    Built to bring heavy fire support online rapidly after cryogenic hypersleep or emergency mobilization.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/smart_gun_operator_gear.rsi
  - type: CMAutomatedVendor
    sections:
    - name: Essential Equipment
      takeAll: CMUAREssentialEquipment
      entries:
      - id: AU14SmartGunMinigunHAZOPS
      - id: AU14HAZOPSBatteryMinigunGAU19Backpack
    - name: Munitions
      entries:
      - id: AU14MagazineMinigunHAZOPS
        amount: 8

- type: entity
  parent: ColMarTechBase
  id: AU14HAZOPSWeaponsVendor
  name: HAZOPS weapons rack
  description: >-
    An automated weapons rack, hooked up to a small armory of Hazardous Operations weaponry of the Marine Special Operations Command.
    Standard issue across the frontier where threats can appear without warning.
    Engineered to arm personnel in seconds following cryogenic hypersleep or emergency mobilization.

    For immediate combat readiness: select a primary weapon kit and a sidearm.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/guns.rsi
  - type: CMAutomatedVendor
    sections:
    - name: Weapons
      choices: { CMUPrimaryWeapon: 1 }
      entries:
      - id: AU14KitWeaponXMP5A6
    - name: Primary Ammunition
      entries:
      - id: AU14MagazineXMP5A6
        amount: 60
    - name: Handguns
      choices: { CMUHandgunsWeapon: 1 }
      entries:
      - id: AU14KitWeaponM4A3
    - name: Handgun Ammunition
      entries:
      - id: CMMagazinePistolM1984
        amount: 60
    - name: Attachments
      choices: { CMUAttachmentsVendor: 1 }
      entries:
      - id: RMCAttachmentRailFlashlight
      - id: RMCAttachmentTwoPointSling

- type: entity
  parent: ColMarTechBase
  id: AU14HAZOPSSpecialWeaponsVendor
  name: HAZOPS special weapons rack
  description: >-
    An automated special weapons rack, hooked up to a restricted armory of Hazardous Operations heavy and breaching ordnance of the Marine Special Operations Command.
    Standard issue only for qualified operators.
    Engineered to deliver overwhelming firepower the instant cryogenic hypersleep ends or an emergency mobilization is called.

    Special weapons protocol: one weapon system of choice with a full ammunition loadout and explosives.
  components:
  - type: Sprite
    sprite: _AU14/Structures/Vendors/genericweaponrack.rsi
  - type: CMAutomatedVendor
    sections:
    - name: M240A2 Heavy Incinerator
      entries:
      - id: AU14WeaponFlamerM240A2HAZOPS
        amount: 1
#     - id: RMCAttachmentUnderbarrelExtinguisherSpec
#       amount: 1
      - id: AU14TankFlamerM240A2HAZOPS
        amount: 8
      - id: RMCBackpackFlamer
        name: G4-1 fueltank
        amount: 1
      - id: RMCPouchFuelTankFilledExtinguisher
        amount: 2
    - name: SPAS-12-HAZ Specialized Shotgun
