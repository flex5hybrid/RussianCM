- type: entity
  parent: RMCHeadsetMarine
  id: AU14CMBHeadset
  name: CMB headset
  description: A headset used by the CMB to communicate.
  suffix: CMB, Colony
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyCMB

- type: entity
