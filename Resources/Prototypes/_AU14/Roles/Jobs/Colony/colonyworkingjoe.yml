- type: job
  parent: AU14JobWorkingJoeBase
  id: AU14JobColonyWorkingJoe
  requirements:
  - !type:RoleTimeRequirement
    role: AU14JobCivilianColonySynthetic
    time: 9000 # 2.5 hours
  - !type:TraitsRequirement
    inverted: true
    traits:
    - SocialAnxietyHeavy
    - FrontalLisp
    - NonResuscitable
    - Epilepsy
  startingGear: AU14GearColonyWorkingJoe
  dummyStartingGear: AU14GearColonyWorkingJoeDummy
  icon: "AU14JobIconColonySynth"
  spawnMenuRoleName: Working Joe (Colony)
  supervisors: au14-job-supervisors-workingjoe-colony
  accessGroups:
  - auadmin
  - Colonist
  - AUPrisonStaff
  - auwy
  special:
  - !type:AddComponentSpecial
    components:
    - type: TypingIndicator
      proto: joe
    - type: Skills
      preset: AU14SkillPresetPlatoonWorkingJoe
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
    - type: MeleeWeapon
      soundHit:
        path: /Audio/_RMC14/Weapons/synthpunch1.ogg
        params:
          variation: 0.15
          volume: -1
      angle: 30
      animation: WeaponArcFist
      attackRate: 1
      damage:
        types:
          Blunt: 60
    - type: MovementSpeedModifier
      baseWalkSpeed: 2.85
      baseSprintSpeed: 3.25
    - type: Synth
      generation: "species-name-workingjoe"
      critThreshold: 300
    - type: MobThresholds
      thresholds:
        0: Alive
        300: Critical # doesnt do anything
        500: Dead
    - type: NameModifier
      baseName: "Working Joe"
    - type: AssignXenoName
    - type: HumanoidAppearance
      species: WorkingJoe
      hideLayersOnEquip:
      - UndergarmentTop
      - HeadTop
    - type: Icon
      sprite: _AU14/Mobs/WorkingJoe/parts.rsi
      state: full
    - type: WorkingJoeVoice
    - type: UserInterface
      interfaces:
        enum.WorkingJoeVoiceUiKey.Key:
          type: WorkingJoeVoiceBui
        enum.VoiceMaskUIKey.Key:
          type: VoiceMaskBoundUserInterface
        enum.HumanoidMarkingModifierKey.Key:
          type: HumanoidMarkingModifierBoundUserInterface
        enum.StrippingUiKey.Key:
          type: StrippableBoundUserInterface
        enum.CMSurgeryUIKey.Key:
          type: CMSurgeryBui
        enum.HolocardChangeUIKey.Key:
          type: HolocardChangeBoundUserInterface
          interactionRange: 0
          requireInputValidation: false
        enum.CMMobStateActionsUI.Key:
          type: CMGhostActionBui
          requireInputValidation: false
        enum.TacticalMapUserUi.Key:
          type: TacticalMapUserBui
        enum.SquadLeaderTrackerUI.Key:
          type: SquadInfoBui
        enum.DialogUiKey.Key:
          type: DialogBui
        enum.ViewIntelObjectivesUI.Key:
          type: ViewIntelObjectivesBui
    - type: Vocal
      sounds:
        Male: AU14WorkingJoeSounds
        Female: AU14WorkingJoeSounds
        Unsexed: AU14WorkingJoeSounds
    - type: IntrinsicRadioReceiver
    - type: IntrinsicRadioTransmitter
      channels:
      - AI
      - Colony
      - WEYA
      - CMB
    - type: ActiveRadio
      channels:
      - AI
      - Colony
      - WEYA
      - CMB
    - type: Access
      groups:
      - auadmin
      - Colonist
      - AUPrisonStaff
      - auwy
    - type: Tag
      tags:
      - WorkingJoe
      - CanPilot
      - FootstepSound
      - DoorBumpOpener
  hidden: false

- type: startingGear
  parent: AU14GearWorkingJoeBase
  id: AU14GearColonyWorkingJoe
  equipment:
    id: AU14IDCardColonyWorkingJoe
    ears: AU14HeadsetWorkingJoe

- type: entity
  parent: CMSpawnPointJobBase
  id: AU14SpawnPointColonyWorkingJoe
  name: Spawn Point Working Joe (Colony)
  components:
  - type: SpawnPoint
    job_id: AU14JobColonyWorkingJoe
  - type: Sprite
    state: syn_spawn

- type: startingGear
  parent: AU14GearColonyWorkingJoe
  id: AU14GearColonyWorkingJoeDummy