        type: ColonyAtmBui
  - type: ColonyAtm


# Department Consoles
- type: entity
  parent: RMCCommunicationsConsoleBase
  id: AUDepartmentConsoleBase
  abstract: true
  name: Department Console
  description: A console for managing department employees, salaries, and communications. Insert cash to fund the department.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal
  - type: InteractionOutline
  - type: ActivatableUI
    key: enum.DepartmentConsoleUi.Key
  - type: UserInterface
    interfaces:
      enum.DepartmentConsoleUi.Key:
        type: DepartmentConsoleBui
  - type: ActivatableUIBlacklist
    blacklist:
      components:
      - Xeno
  - type: DepartmentConsole
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access:
    - - CMAccessColonyCommand
  - type: ItemSlots
    slots:
      CashSlot:
        whitelist:
          tags:
          - RMCSpaceCash
  - type: ContainerContainer
    containers:
      CashSlot: !type:ContainerSlot {}

