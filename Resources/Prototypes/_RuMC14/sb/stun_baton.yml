- type: entity
  parent: RMCStunBatonDamaged
  id: TelescopicBaton
  name: telescopic baton
  description: A telescopic baton for close-quarters combat. Minor damage when off, powerful hits when extended.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Melee/stun_baton.rsi
    layers:
    - state: stunbaton_off
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Melee/stun_baton.rsi
    slots:
    - Belt
    - Suitstorage
  - type: Item
    heldPrefix: off
    size: Small
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: stunbaton_on}
          False: {state: stunbaton_off}
  - type: ItemToggle
    predictable: false
    soundActivate:
      collection: sparks
      params:
        variation: 0.250
    soundDeactivate:
      collection: sparks
      params:
        variation: 0.250
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
      params:
        variation: 0.250
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/Weapons/egloves.ogg
      params:
        variation: 0.2
    activatedSoundOnHitNoDamage:
      path: /Audio/Weapons/egloves.ogg
      params:
        variation: 0.2
    activatedDamage:
      types:
        Blunt: 35
    activatedCritical: true
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 5
    bluntStaminaDamageFactor: 2.0
    angle: 60
    animation: WeaponArcThrust
  - type: RMCStaminaDamageOnCollide
    damage: 35
  - type: LandAtCursor
  - type: UseDelay
  - type: DisarmMalus
    malus: 0.225
  - type: StunOnHit
    duration: 20
    whitelist:
      components:
      - Marine
