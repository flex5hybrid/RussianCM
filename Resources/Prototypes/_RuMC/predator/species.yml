- type: species
  id: Predator
  name: species-name-predator
  roundStart: true
  prototype: RuCMMobPredator # Load the rmc14 human instead of ss14
  sprites: MobPredatorSprites
  markingLimits: MobPredatorMarkingLimits
  dollPrototype: MobPredatorDummy
  skinColoration: Hues

# The lack of a layer means that
# this person cannot have round-start anything
# applied to that layer. It has to instead
# be defined as a 'custom base layer'
# in either the mob's starting marking prototype,
# or it has to be added in C#.
- type: speciesBaseSprites
  id: MobPredatorSprites
  sprites:
    # Special: MobHumanoidAnyMarking
    Head: MobPredatorHead
    # Hair: MobHumanoidAnyMarking
    # FacialHair: MobHumanoidAnyMarking
    # Snout: MobHumanoidAnyMarking
    # UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobPredatorUndergarmentBottom
    Chest: MobPredatorTorso
    # Eyes: MobHumanoidEyes
    # HeadTop: MobHumanoidAnyMarking
    LArm: MobPredatorLArm
    RArm: MobPredatorRArm
    LHand: MobPredatorLHand
    RHand: MobPredatorRHand
    LLeg: MobPredatorLLeg
    RLeg: MobPredatorRLeg
    LFoot: MobPredatorLFoot
    RFoot: MobPredatorRFoot

