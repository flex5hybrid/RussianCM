# Корпус от пластиковой взрывчатки.
- type: entity
  name: C4 plastic casing
  description: An empty C4 plastic explosive casing. Must be planted on an object. Fill with a detonator assembly and chemicals.
  parent: RMCCasingBase
  id: RMCC4PlasticCasing
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/CustomOrdnance/c4plasticcasing.rsi
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 7500
      RMCPlastic: 2000
  - type: RMCChembombCasing
    maxVolume: 180
    basePower: 280
    baseFalloff: 120
    baseShards: 100
    minFireIntensity: 4
    maxFireIntensity: 50
    minFireRadius: 2
    maxFireRadius: 4
    minFireDuration: 5
    maxFireDuration: 20
  - type: SolutionContainerManager
    solutions:
      chemicals:
        maxVol: 180
  - type: ItemSlots
    slots:
      detonator:
        name: rmc-chembomb-detonator-slot
        whitelist:
          tags:
          - RMCOrdnanceAssemblyLocked
          - RMCTimerAssembly
          - RMCDoubleIgniterAssembly
          - RMCSignalerAssembly
