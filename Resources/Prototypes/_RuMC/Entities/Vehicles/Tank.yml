# Tank.yaml
- type: entity
  id: RUMCTank
  name: Беовульф IV
  description: Тяжелая боевая машина морпехов.
  components:

  - type: Tank

  - type: Hands

  - type: GiveHands
    hands:
    - name: Right Hand
      location: Right
    - name: Left Hand
      location: Left

  - type: TankMouseRotator
    angleTolerance: 5
    rotationSpeed: 180
    simple4DirMode: false

  - type: MobMover
  - type: InputMover
  - type: InteractionOutline
  - type: Appearance
  - type: DoAfter

  # Возможность «садиться» в танк
  - type: ContainerContainer
    containers:
      rmc-mech-pilot: !type:ContainerSlot

  # Физика + коллизия
  - type: Physics
    bodyType: Dynamic
    mass: 5000
    fixedRotation: false
    linearDamping: 0.5
    angularDamping: 0.8

  - type: Clickable

  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 1.5
        density: 1000
        mask:
        - Impassable
        layer:
        - Impassable

  # Визуализация и попадание урона
  - type: Sprite
    sprite: RuMC/Vehicles/tank.rsi
    layers:
    - state: ace_autocannon_0
    - state: ace_autocannon_1
    - state: ARMOR
    - state: artillerymod_0
    - state: artillerymod_1
    - state: ballistic_armor_0
    - state: ballistic_armor_1
    - state: caustic_armor_0
    - state: caustic_armor_1
    - state: concussive_armor_0
    - state: concussive_armor_1
    - state: damaged_frame
    - state: damaged_hardpt_armor
    - state: damaged_hardpt_primary
    - state: damaged_hardpt_secondary
    - state: damaged_hardpt_support
    - state: damaged_turret
    - state: drgn_flamer_0
    - state: drgn_flamer_1
    - state: empty fuel
    - state: flamer_0
    - state: flamer_1
    - state: glauncher_0
    - state: glauncher_1
    - state: ltaaap_minigun_0
    - state: ltaaap_minigun_1
    - state: ltb_cannon_0
    - state: ltb_cannon_1
    - state: m56cupola_0
    - state: m56cupola_1
    - state: MISC
    - state: odrive_enhancer_0
    - state: odrive_enhancer_1
    - state: paladin_armor_0
    - state: paladin_armor_1
    - state: PRIMARY
    - state: SECONDARY
    - state: slauncher_0
    - state: slauncher_1
    - state: slauncher_2
    - state: snowplow_0
    - state: snowplow_1
    - state: SUPPORT
    - state: tank_base
    - state: tank_turret_0
    - state: tank_turret_1
    - state: towlauncher_0
    - state: towlauncher_1
    - state: treads_0
    - state: treads_1
    - state: vehicle_clamp
    - state: warray_0
    - state: warray_1

  # todo: Запилить логику нанесения урона танку
  - type: Damageable
    damageContainer: Inorganic

  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1500
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
