# Tank.yaml
- type: entity
  id: Tank
  name: Колониальный танк M-22
  description: Тяжелая боевая машина морпехов.
  components:
  - type: Tank
    maxHealth: 1500
    armor: 700
    maxFuel: 300
  - type: TankMovement
    maxSpeed: 4.5
    acceleration: 1.8
    rotationSpeed: 1.2
  - type: TankGun
    maxAmmo: 25
    cooldown: 2.0
    projectilePrototype: TankShell
  - type: Physics
    bodyType: Dynamic
    mass: 5000
    fixedRotation: false
    linearDamping: 0.5
    angularDamping: 0.8
    shapes: # Используем встроенную систему форм
      - type: circle
        radius: 1.5
        layer: Impassable
        mask: Impassable
  - type: Sprite
    sprite: Vehicles/tank.rsi
    state: base

# TankShell.yaml
- type: entity
  id: TankShell
  name: Танковый снаряд
  components:
  - type: Projectile
    damage:
      damage: 150
    deleteOnCollide: true
    ignoreShooter: true
    lifetime: 5
  - type: Physics
    bodyType: Dynamic
    mass: 5
    shapes:
      - type: circle
        radius: 0.2
        layer: Default
        mask: Impassable
    linearDamping: 0.0
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectile.rsi
    state: bullet
