# Tank.yaml
- type: entity
  id: Tank
  name: Колониальный танк M-22
  description: Тяжелая боевая машина морпехов.
  components:

  # 1) Возможность «садиться» в танк
  - type: ContainerContainer
    containers:
      tank-driver: !type:ContainerSlot
  - type: GiveHands
    hands:
    - name: Driver
      location: Center

  # 2) Логика здоровья/топлива
  - type: Tank
    maxHealth: 1500
    armor: 700
    maxFuel: 300

  # 3) Ваши системы движения и стрельбы
  - type: TankMovement
    maxSpeed: 4.5
    acceleration: 1.8
    rotationSpeed: 1.2
  - type: TankGun
    maxAmmo: 25
    cooldown: 2.0
    projectilePrototype: TankShell

  # 4) Физика без «shapes», но с Fixtures
  - type: Physics
    bodyType: Dynamic
    mass: 5000
    fixedRotation: false
    linearDamping: 0.5
    angularDamping: 0.8
  - type: Fixtures
    fixtures:
      body:
        shape:
          !type:PhysShapeCircle
          radius: 1.5
        density: 1000
        mask:
        - Impassable
        layer:
        - Impassable

  # 5) Визуализация и попадание урона
  - type: Sprite
    sprite: Vehicles/tank.rsi
    state: base
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1500
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]

# TankShell.yaml
- type: entity
  id: TankShell
  name: Танковый снаряд
  components:
  - type: Projectile
    damage:
      damage: 150
    deleteOnCollide: true
    ignoreShooter: true
    lifetime: 5
  - type: Physics
    bodyType: Dynamic
    mass: 5
    shapes:
    - type: circle
      radius: 0.2
      layer: Default
      mask: Impassable
    linearDamping: 0.0
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectile.rsi
    state: bullet
