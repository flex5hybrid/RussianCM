- type: reagent
  parent: CMReagent
  id: RMCPolytrinicAcid
  name: reagent-name-polytrinic-acid
  group: Toxins
  desc: reagent-desc-polytrinic-acid
  physicalDesc: reagent-physical-desc-strong-smelling
  flavor: acid
  color: "#8E18A9"
  boilingPoint: 78.2
  meltingPoint: -19.4
  toxin: true
  plantMetabolism:
  - !type:PlantAdjustToxins
    amount: 20
  - !type:PlantAdjustWeeds
    amount: -4
  - !type:PlantAdjustHealth
    amount: -8
  reactiveEffects:
    Acidic:
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        scaleByQuantity: true
        ignoreResistances: false
        damage:
          types:
            Caustic: 0.5
      - !type:Emote
        emote: Scream
        probability: 0.3
  metabolisms:
    Poison:
      metabolismRate: 0.1
      effects:
      - !type:Toxic
        potency: 2
      - !type:Corrosive
        potency: 3

- type: reaction
  id: RMCPolytrinicAcidReaction
  reactants:
    RMCSulphuricAcid:
      amount: 1
    RMCChlorine:
      amount: 1
    RMCPotassium:
      amount: 1
  products:
    RMCPolytrinicAcid: 3

