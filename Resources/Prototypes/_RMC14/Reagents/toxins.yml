  criticalOverdose: 50
  metabolisms:
    Poison:
      metabolismRate: 0.05
      effects: #TODO Hallucinations +2 max 40.
      - !type:ModifyStatusEffect
        effectProto: StatusEffectSeeingRainbow
        type: Add
        time: 2 #TODO max 40
        refresh: false
      - !type:Emote
        emote: Laugh #TODO twitches, drools, moans.
        showInChat: true
        probability: 0.05
      - !type:Jitter
        #TODO RandomWalk at 30 OD
        #TODO more jitter at 30 OD
      - !type:GenericStatusEffect
        conditions:
        - !type:ReagentThreshold #TODO 2 brain damage/s at 50 OD
          min: 50
        key: Unconscious
        component: RMCUnconscious
        type: Add
        time: 40
        refresh: true

- type: reagent
  parent: [ CMReagent, Romerol ]
  id: RMCBlackGoo
  name: reagent-name-rmcblackgoo
  desc: reagent-desc-rmcblackgoo
  physicalDesc: reagent-physical-desc-unidentifiable
  flavor: bitter
  color: "#0a0b0d"
  worksOnTheDead: true
  unknown: true
  metabolisms:
    Medicine:
      effects:
        - !type:CauseZombieInfection
          conditions:
            - !type:ReagentThreshold
              min: 5

- type: reagent
  parent: CMReagent
  id: RMCChloralhydrate
  name: reagent-name-rmc-chloral-hydrate
  desc: reagent-desc-rmc-chloral-hydrate
  physicalDesc: reagent-physical-desc-nondescript
  color: "#000067"
  flavor: bitter
  unknown: true
  toxin: true
  overdose: 15
  criticalOverdose: 25
  metabolisms:
    Poison:
      metabolismRate: 0.05
      effects:
      - !type:Toxic
        potency: 1
      - !type:Emote # Sedative 6
        emote: Yawn
        showInChat: true
        probability: 0.25 #TODO makes them confused and eventually sleepy
      - !type:GenericStatusEffect
        conditions:
        - !type:ReagentThreshold
          min: 15
        key: Unconscious
        component: RMCUnconscious
        type: Add
        time: 3
        refresh: false
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 25
        damage:
          types:
            Asphyxiation: 15

- type: reagent
