- type: reagent
  parent: CMReagent
  id: RMCGlycerol
  name: reagent-name-rmc-glycerol
  desc: reagent-desc-rmc-glycerol
  physicalDesc: reagent-physical-desc-oily
  flavor: sweet
  color: "#F5F5DC"
  unknown: true

# Synthesis reactions
- type: reaction
  id: RMCAmmoniumNitrateReaction
  reactants:
    Ammonia:
      amount: 1
    RMCPolytrinicAcid:
      amount: 1
  products:
    RMCAmmoniumNitrate: 2

- type: reaction
  id: RMCANFOReaction
  impact: High
  reactants:
    RMCAmmoniumNitrate:
      amount: 2
    WeldingFuel:
      amount: 1
  products:
    RMCANFO: 2
  effects:
  - !type:RMCVolatileReactionEffect
    threshold: 60.01

- type: reaction
  id: RMCPotassiumHydroxideReaction
  impact: High
  reactants:
    RMCPotassium:
      amount: 1
    Water:
      amount: 1
  products:
    RMCPotassiumHydroxide: 1
  effects:
  - !type:RMCVolatileReactionEffect

- type: reaction
  id: RMCHexamineReaction
  reactants:
    RMCFormaldehyde:
      amount: 3
    Ammonia:
      amount: 2
  products:
    RMCHexamine: 3

- type: reaction
  id: RMCCycloniteReaction
  reactants:
    RMCHexamine:
      amount: 1
    RMCPolytrinicAcid:
      amount: 1
  products:
    RMCCyclonite: 1

- type: reaction
  id: RMCOctogenReaction
  reactants:
    RMCHexamine:
      amount: 1
    RMCPolytrinicAcid:
      amount: 1
    RMCParaformaldehyde:
      amount: 1
    RMCAmmoniumNitrate:
      amount: 1
  products:
    RMCOctogen: 2

- type: reaction
  id: RMCNitroglycerinReaction
  impact: High
  reactants:
    RMCGlycerol:
      amount: 1
    RMCPolytrinicAcid:
      amount: 1
    RMCSulphuricAcid:
      amount: 1
  products:
    RMCNitroglycerin: 2
  effects:
  - !type:RMCVolatileReactionEffect
    threshold: 5.01
