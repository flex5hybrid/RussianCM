- type: entity
  parent: ColMarTechBase
  id: ColMarTechMedicalEquipment
  name: ColMarTech squad medical equipment rack
  description: An automated rack hooked up to a colossal storage of hospital corpsman standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessMedPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMHospitalCorpsman
    - CMPVEHospitalCorpsman
    sections:
    - name: Стандартная экипировка
      takeAll: CMStandard
      entries:
      - id: CMVendorBundleSquadMedicalApparel
      - id: RMCHandsLatexMarine
        name: боевые стерильные перчатки
      - id: CMMRE
      #- id: CMMap # TODO: Make a map
    - name: Броня
      choices: { CMArmor: 1 }
      entries:
      - id: RMCArmorVestSquad
        name: сверхлёгкая броня М3-XL
      - id: RMCArmorM3LightVariants
        name: лёгкая броня
      - id: RMCArmorM3MediumVariants
        name: средняя броня
        recommended: true
      - id: RMCArmorM3HeavyVariants
        name: тяжёлая броня
    - name: Шлем
      choices: { CMHelmet: 1 }
      entries:
      - id: CMArmorHelmetM10Medic
      - id: RMCArmorHelmetM10MedicWhite
        recommended: true
    - name: Рюкзак
      choices: { CMBackpack: 1 }
      entries:
      - id: CMBackpackMarineMedic
        replaceSlot: back
      - id: CMSatchelMarineMedic
        replaceSlot: back
        recommended: true
    - name: Пояс
      choices: { CMBelt: 1 }
      entries:
      - id: CMBeltMedicBagFilled
        name: Сумка-спасатель M276 (Заполненная)
      - id: CMBeltMedicalFilled
        name: Медицинский пояс M276 (Заполненная)
    - name: Подсумки
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchReagentCanisterTricordrazineRevival
        name: подсумок канистры под давлением (Комплект для реабилитации - Трикордразин)
        recommended: true
      - id: RMCPouchMedkit
        recommended: true
#     - id: CMPressurizedReagentCanisterPouchPeridaxonRevivalMix
#       name: Pressurized Reagent Canister Pouch\n(Revival Mix - Peridaxon)
#       recommended: true
      - id: RMCPouchAutoinjector
      - id: RMCPouchFirstResponder
      - id: RMCPouchReagentCanisterBicaridine
        name: подсумок канистры под давлением (Бикаридин)
      - id: RMCPouchReagentCanisterKelotane
        name: подсумок канистры под давлением (Келотан)
      - id: RMCPouchReagentCanisterTricordrazine
        name: подсумок канистры под давлением (Трикордразин)
      - id: RMCPouchReagentCanister
        name: подсумок канистры под давлением (Пустая)
      - id: RMCPouchVialFill
        name: подсумок для флаконов (Полный)
      - id: RMCPouchMedical
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (инъекторы)
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (бинт, мазь, инъектор трикордразина) # TODO RMC14 splints comma
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки)
      - id: RMCPouchFlareFilled
        name: подсумок фаеров (Заполненный)
      - id: RMCPouchGeneralLarge
      - id: RMCPouchSling
      - id: RMCPouchMagazinePistolLarge
      - id: RMCPouchMagazine
      - id: RMCPouchShotgun
      - id: RMCPouchPistol
    - name: Разгрузки
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBrown
        recommended: true
      - id: CMWebbingBlack
        recommended: true
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
    - name: Маски
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskSterile
      - id: CMMaskGas
      - id: CMMaskCoif
      - id: RMCMaskRebreather

