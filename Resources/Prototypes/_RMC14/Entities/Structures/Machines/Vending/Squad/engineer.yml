- type: entity
  parent: ColMarTechBase
  id: ColMarTechSCTEquipment
  name: ColMarTech squad comtech equipment rack
  description: An automated rack hooked up to a colossal storage of combat technician standard-issue equipment.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: AccessReader
    access:
    - [ "CMAccessCombatTechPrep" ]
  - type: CMAutomatedVendor
    jobs:
    - CMCombatTech
    sections:
    - name: Стандартная экипировка
      takeAll: CMStandard
      entries:
      - id: CMVendorBundleCombatTechnicianApparel
      - id: CMMRE
      #- id: CMMap # TODO: Make a map
    - name: Перчатки
      choices: { CMHands: 1 }
      entries:
      - id: CMHandsInsulated
      - id: CMHandsBlackInsulated
    - name: Шлем
      choices: { CMHelmet: 1 }
      entries:
      - id: CMArmorHelmetM10Tech
      - id: RMCArmorHelmetM10Welding
    - name: Броня
      choices: { CMArmor: 1 }
      entries:
      - id: RMCArmorVestSquad
        name: сверхлёгкая броня М3-XL
      - id: RMCArmorM3LightVariants
        name: лёгкая броня
      - id: RMCArmorM3MediumVariants
        name: средняя броня
        recommended: true
      - id: RMCArmorM3HeavyVariants
        name: тяжёлая броня
    - name: Рюкзак
      choices: { CMBackpack: 1 }
      entries:
      - id: RMCScabbardMacheteFilled
        name: ножны для мачете (Заполненные)
      - id: CMBackpackMarineTech
        replaceSlot: back
      - id: CMSatchelMarineTech
        replaceSlot: back
      - id: CMBackpackWelder
        replaceSlot: back
        recommended: true
      - id: RMCSatchelWelder
        replaceSlot: back
      - id: RMCSatchelWelderChestrig
        replaceSlot: back
        recommended: true
    - name: Пояс
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltConstruction
        recommended: true
      - id: CMBeltUtilityFilled
        name: пояс схемы M276 для инструментов (Заполненный)
        # mandatory: true, TODO allow vendors to mark entries as mandatory
      - id: RMCBeltUtilityGeneral
      - id: CMBeltMarine
      - id: RMCBeltHolsterPistol
      - id: RMCBeltHolsterRevolver
      - id: RMCBeltHolsterSMG
      - id: RMCBeltHolsterSMGPouch
      - id: RMCM82FHolster
      - id: RMCM276ShotgunShellLoadingRig
      - id: RMCBeltGrenade
    - name: Подсумки
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchConstruction
        recommended: true
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (инъекторы)
        recommended: true
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (бинт, мазь, инъектор трикордразина) # TODO RMC14 splints comma
        recommended: true
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки)
        recommended: true
      - id: RMCPouchElectronicsFill
        name: подсумок для электроники (Заполненный)
      - id: RMCPouchExplosive
      - id: RMCPouchFlareFilled
        name: подсумок фаеров (Заполненный)
      - id: RMCPouchMagazinePistolLarge
      - id: RMCPouchMagazine
      - id: RMCPouchShotgun
      - id: RMCPouchGeneralMedium
      - id: RMCPouchPistol
      - id: RMCPouchToolsFill
        name: подсумок инструментов (Заполненный)
      - id: RMCPouchEngineerKit
    - name: Разгрузки
      choices: { CMAccessories: 1 }
      entries:
      - id: RMCToolWebbingSmallFilled
        name: малая разгрузка для инструментов (Заполненная)
        recommended: true
      - id: CMWebbingBlack
      - id: CMWebbingBrown
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
    - name: Маски
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskGas
      - id: CMMaskCoif
      - id: RMCMaskRebreather

- type: entity
  parent: ColMarTechBase
  id: ColMarTechSCTTools
  name: ColMarTech squad comTech tools vendor
  description: A vending machine that stores various extra tools that are useful on the field.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessCombatTechPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/tool.rsi
    layers:
    - state: "off"
      map: [ "enum.VendingMachineVisualLayers.Base" ]
    - state: "normal-unshaded"
      map: [ "enum.VendingMachineVisualLayers.BaseUnshaded" ]
  - type: CMAutomatedVendor
    access:
    - "CMAccessCombatTechPrep"
    hackable: true
    jobs:
    - CMCombatTech
    sections:
    - name: Equipment
      entries:
      - id: CMBeltUtility
        name: utility tool belt
        amount: 4
      - id: RMCCableCoil
        amount: 4
      - id: RMCWeldingGoggles
        amount: 2
      - id: RMCEngineerKit
        amount: 2
    - name: Tools
      entries:
      - id: CMWelder
        amount: 4
      - id: CMCrowbar
        amount: 4
      - id: CMScrewdriver
        amount: 4
      - id: CMWirecutter
        amount: 4
      - id: CMWrench
        amount: 4
      - id: CMMultitool
        amount: 4
      - id: CMWelderSmall
        amount: 2
      - id: RMCLightReplacer
        amount: 4
    - name: Utility
      entries:
      - id: RMCSentryLaptop
        name: sentry gun network laptop
        amount: 4
    #   - id: Sentry Gun Network Encryption KEy
    #     amount: 4
