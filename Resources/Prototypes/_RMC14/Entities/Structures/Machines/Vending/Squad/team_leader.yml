- type: entity
  parent: ColMarTechBase
  id: ColMarTechFLEquipment
  name: ColMarTech fireteam leader equipment rack
  description: An automated rack hooked up to a colossal storage of fireteam leader standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessFTLPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMFireteamLeader
    sections:
    - name: Стандартная экипировка
      takeAll: CMStandard
      entries:
      - id: CMVendorBundleFireteamLeaderApparel
      - id: RMCBackpackRTO
        replaceSlot: back
      - id: CMMRE
      #- id: CMMap # TODO: Make a map
      - id: RMCVendorBundleCrewFireteamLeader
    - name: Перчатки
      choices: { CMHands: 1 }
      entries:
      - id: CMHandsInsulated
      - id: CMHandsBlackInsulated
    - name: Броня
      choices: { CMArmor: 1 }
      entries:
      - id: CMArmorM4
        recommended: true
      - id: RMCArmorVestSquad
        name: сверхлёгкая броня М3-XL
    - name: пояс
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltUtilityGeneral
      - id: CMBeltMarine
        recommended: true
      - id: RMCBeltHolsterPistol
      - id: RMCBeltHolsterM13
      - id: RMCBeltHolsterRevolver
      - id: RMCBeltHolsterSMG
      - id: RMCBeltHolsterSMGPouch
      - id: RMCM82FHolster
      - id: RMCM276ShotgunShellLoadingRig
      - id: CMBeltUtilityFilled
        name: пояс схемы M276 для инструментов (Заполненный)
        recommended: true
      - id: RMCBeltGrenade
    - name: подсумки
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (инъекторы)
        recommended: true
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (бинт, мазь, инъектор трикордразина) # TODO RMC14 splints comma
        recommended: true
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки)
        recommended: true
      - id: RMCPouchFirstResponder
      - id: RMCPouchFlareFilled
        name: подсумок фаеров (Заполненный)
      - id: RMCPouchFuelTank
      - id: RMCPouchGeneralLarge
      - id: RMCPouchSling
      - id: RMCPouchMagazinePistolLarge
      - id: RMCPouchMagazine
      - id: RMCPouchShotgun
      - id: RMCPouchPistol
      - id: RMCPouchToolsFill
        recommended: true
        name: подсумок инструментов (Заполненный)
    - name: Разгрузки
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBlack
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbingBrown
        recommended: true
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
    - name: Маски
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskGas
      - id: CMMaskCoif
      - id: RMCMaskRebreather

- type: entity
  parent: CMVendorBundleRiflemanApparel
  id: RMCVendorBundleCrewFireteamLeader
  name: essential fireteam leader utilities
  description: Contains a laser designator, and two packs of signal flares.
  components:
    - type: Sprite
      sprite: _RMC14/Objects/Devices/binoculars.rsi
      layers:
        - state: rangefinder
        - state: laser_cas
    - type: CMVendorBundle
      bundle:
        - RMCPackFlareCAS
        - RMCPackFlareCAS
        - RMCLaserDesignator
