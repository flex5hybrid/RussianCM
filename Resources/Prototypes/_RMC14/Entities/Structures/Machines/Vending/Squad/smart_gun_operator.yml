# SMART GUN OPERATOR

- type: entity
  parent: ColMarTechBase
  id: ColMarTechSGGear
  name: ColMarTech squad smartgunner gear rack
  description: An automated gear rack for Squad Smartgunners.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessSmartPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/smart_gun_operator_gear.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMSmartGunOperator
    sections:
    - name: Набор Оператора Смартгана (Обязательный)
      takeAll: CMSmartGunSet
      entries:
      - id: CMSmartGunOperatorEquipmentCase
    - name: Обвесы для пистолета
      choices: { CMGunAttachments: 1 }
      entries:
      - id: RMCAttachmentLaserSight
      - id: RMCAttachmentS5RedDotSight
      - id: RMCAttachmentS5MicroRedDotSight
      - id: RMCAttachmentS6ReflexSight
    - name: Гранаты
      entries:
      - id: CMPacketGrenadeHighExplosiveFilled
        points: 30
      - id: RMCPacketGrenadeIncendiaryFilled
        points: 30
    #- id: CMM40HPDPWhitePhosphorusPacketx3
    #  points: 30
      - id: RMCPacketGrenadeSmokeFilled
        points: 15
      - id: RMCPacketGrenadeM74AGMFFilled
        points: 20
      - id: RMCPacketGrenadeM74AGMIFilled
        points: 20
      - id: RMCPacketGrenadeM74AGMSFilled
        points: 10
      - id: RMCPacketGrenadeM74AGMSHornetFilled
        points: 20
      - id: RMCBoxClaymoreMineFilled
        points: 20
    - name: Боеприпасы к вторичному оружию
      entries:
      - id: RMCMagazinePistolM13Ext
        points: 6
      # - id: RMCSpeedLoader44Heavy
      #  points: 10
      - id: RMCSpeedLoader44Marksman
        points: 10
      - id: RMCMagazinePistolM1984HP
        points: 5
      - id: RMCMagazinePistolM1984AP
        points: 5
      - id: CMMagazinePistolMK80
        points: 5
      - id: RMCMagazinePistolSU6
        points: 10
    - name: Огнестрельное оружие с ограниченным доступом
      entries:
      - id: RMCGunCasePistolMK80
        points: 15
      - id: RMCGunCasePistolSmart
        points: 15
    - name: Предметы одежды
      entries:
      - id: RMCScabbardMacheteSGFilled
        points: 15
      - id: RMCPouchFuelTank
        points: 5
      - id: RMCPouchGeneralLarge
        points: 6
    - name: Утилиты
      entries:
      - id: CMFireExtinguisherPortable
        points: 5
      - id: RMCWhistle
        points: 5
      - id: CMRollerBedSpawnFolded
        points: 5
      - id: RMCFulton20
        points: 5
      - id: RMCPowerCellSmartgun
        points: 15
    - name: Бинокль
      entries:
      - id: RMCBinoculars
        points: 5
      - id: RMCRangefinder
        points: 10
      - id: RMCLaserDesignator
        points: 15
    - name: Визор для шлема
      entries:
      - id: RMCVisorMedical
        points: 15
      - id: RMCVisorWelding
        points: 5
    - name: Брошюры
      entries:
      - id: CMPamphletJTAC
        points: 15
      - id: CMPamphletEngineer
        points: 15
    - name: Радиоключи
      entries:
      - id: CMEncryptionKeyEngineer
        points: 5
      - id: CMEncryptionKeyIntel
        points: 5
      - id: CMEncryptionKeyJTAC
        points: 5
      - id: CMEncryptionKeyRequisition
        points: 5
      - id: CMEncryptionKeyMedical
        points: 5

- type: entity
  parent: ColMarTechBase
  id: ColMarTechSGEquipment
  name: ColMarTech squad Smart Gun equipment rack
  description: An automated rack hooked up to a colossal storage of Squad Smart Gun standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessSmartPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMSmartGunOperator
    sections:
    - name: Стандартная экипировка
      takeAll: CMStandard
      entries:
      - id: CMVendorBundleRiflemanApparel
      - id: CMMRE
      #- id: CMMap # TODO: Make a map
    - name: Пояс
      choices: { CMBelt: 1 }
      entries:
      - id: CMBeltSmartGunOperatorFilled
      - id: RMCBeltSmartGunOperatorPistolFilled
    - name: Подсумки
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchFlareFilled
        name: подсумок фаеров (Заполненный)
      - id: RMCPouchElectronics
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (инъекторы)
        recommended: true
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (бинт, мазь, инъектор трикордразина) # TODO RMC14 splints comma
        recommended: true
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки)
        recommended: true
        recommended: true
      - id: RMCPouchMagazinePistolLarge
        recommended: true
      - id: RMCPouchMagazine
      - id: RMCPouchShotgun
      - id: RMCPouchGeneralMedium
      - id: RMCPouchPistol
      - id: RMCPouchMacheteFilled
        name: Подсумок с мачете (Заполненный)
      - id: RMCPouchSling
    - name: Разгрузка
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBrown
        recommended: true
      - id: CMWebbingBlack
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
    - name: Маски
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskGas
      - id: CMMaskCoif
      - id: RMCMaskRebreather
